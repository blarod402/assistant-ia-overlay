<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Switcher</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:transparent}
body{touch-action:none}

#btns{position:fixed;display:flex;flex-direction:column;gap:12px;z-index:9999;bottom:40px;right:24px}

.fab{width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;letter-spacing:.05em;color:#fff;touch-action:none;user-select:none;position:relative}

#btnGo{background:linear-gradient(135deg,#ff3c6e,#7c3aed);box-shadow:0 4px 20px rgba(255,60,110,.6);animation:pulseGo 2.5s infinite}
#btnBack{background:linear-gradient(135deg,#7c3aed,#2563eb);box-shadow:0 4px 20px rgba(124,58,237,.5);animation:pulseBack 2.5s infinite}

@keyframes pulseGo{0%,100%{box-shadow:0 4px 20px rgba(255,60,110,.6),0 0 0 0 rgba(255,60,110,.3)}50%{box-shadow:0 4px 20px rgba(255,60,110,.6),0 0 0 12px rgba(255,60,110,0)}}
@keyframes pulseBack{0%,100%{box-shadow:0 4px 20px rgba(124,58,237,.5),0 0 0 0 rgba(124,58,237,.3)}50%{box-shadow:0 4px 20px rgba(124,58,237,.5),0 0 0 12px rgba(124,58,237,0)}}

.fab svg.ring{position:absolute;top:0;left:0;width:64px;height:64px;transform:rotate(-90deg);pointer-events:none}
.fab svg.ring circle{fill:none;stroke:rgba(255,255,255,0.9);stroke-width:3;stroke-dasharray:188;stroke-dashoffset:188}
.fab.pressing svg.ring circle{stroke-dashoffset:0;transition:stroke-dashoffset 2s linear}

.fab .lbl{font-size:.72rem;font-weight:800;letter-spacing:.05em;line-height:1;text-align:center}
.fab .sublbl{font-size:.5rem;opacity:.7;margin-top:2px;text-align:center}

#appPicker{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:99998;display:none;flex-direction:column;backdrop-filter:blur(10px)}
#appPicker.on{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.picker-header{padding:20px 20px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.picker-title{font-size:1rem;font-weight:700;color:#e8e8f0;font-family:sans-serif}
.picker-target{font-size:.78rem;color:#ff3c6e;font-weight:600;font-family:sans-serif}
.picker-close{background:rgba(255,255,255,.1);border:none;color:#e8e8f0;font-size:1.1rem;cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;touch-action:manipulation}

.picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 12px 32px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}

.app-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 4px;border-radius:14px;cursor:pointer;touch-action:manipulation}
.app-item:active{background:rgba(255,255,255,.08)}
.app-item .icon{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.7rem;flex-shrink:0}
.app-item .name{font-size:.65rem;color:#c8c8d8;text-align:center;line-height:1.3;font-family:sans-serif}
.app-item.selected .icon{outline:3px solid #ff3c6e;outline-offset:2px}

#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#1e1e2a;border:1px solid #2a2a3d;color:#e8e8f0;padding:9px 18px;border-radius:10px;font-size:.8rem;font-family:sans-serif;z-index:99999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap}
#toast.on{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="btns">
  <div class="fab" id="btnGo" data-target="go">
    <svg class="ring"><circle cx="32" cy="32" r="30"/></svg>
    <div><div class="lbl" id="goLbl">GO</div><div class="sublbl" id="goSub"></div></div>
  </div>
  <div class="fab" id="btnBack" data-target="back">
    <svg class="ring"><circle cx="32" cy="32" r="30"/></svg>
    <div><div class="lbl" id="backLbl">BACK</div><div class="sublbl" id="backSub"></div></div>
  </div>
</div>

<div id="appPicker">
  <div class="picker-header">
    <div>
      <div class="picker-title">Choisir une app</div>
      <div class="picker-target" id="pickerTarget"></div>
    </div>
    <button class="picker-close" id="pickerClose">✕</button>
  </div>
  <div class="picker-grid" id="pickerGrid"></div>
</div>

<div id="toast"></div>

<script>
let goApp = JSON.parse(localStorage.getItem('goApp') || 'null')
let backApp = JSON.parse(localStorage.getItem('backApp') || 'null')
let currentPicker = null
let pressTimer = null

function toast(msg, d=2000){
  const t=document.getElementById('toast')
  t.textContent=msg; t.classList.add('on')
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),d)
}

function updateLabels(){
  document.getElementById('goLbl').textContent = goApp ? goApp.name.substring(0,5) : 'GO'
  document.getElementById('goSub').textContent = goApp ? '' : 'hold'
  document.getElementById('backLbl').textContent = backApp ? backApp.name.substring(0,5) : 'BACK'
  document.getElementById('backSub').textContent = backApp ? '' : 'hold'
}
updateLabels()

function tapBtn(target){
  if(target === 'go'){
    if(!goApp){ openPicker('go'); return }
    if(typeof Android !== 'undefined') Android.openApp(goApp.pkg)
    else toast('🚀 Ouverture '+goApp.name)
  } else {
    if(!backApp){
      if(typeof Android !== 'undefined') Android.goBack()
      else toast('⬅️ Retour')
      return
    }
    if(typeof Android !== 'undefined') Android.openApp(backApp.pkg)
    else toast('⬅️ '+backApp.name)
  }
}

function openPicker(target){
  currentPicker = target
  document.getElementById('pickerTarget').textContent = target==='go' ? '→ Bouton GO' : '→ Bouton BACK'
  renderGrid(target)
  document.getElementById('appPicker').classList.add('on')
}

function renderGrid(target){
  const grid = document.getElementById('pickerGrid')
  grid.innerHTML = ''
  const selected = target==='go' ? goApp : backApp

  // Option retour système pour BACK
  if(target === 'back'){
    const sys = document.createElement('div')
    sys.className = 'app-item' + (!backApp ? ' selected' : '')
    sys.innerHTML = `<div class="icon" style="background:#1e1e2a">⬅️</div><div class="name">Retour</div>`
    sys.onclick = () => { backApp=null; localStorage.removeItem('backApp'); updateLabels(); closePicker(); toast('✅ BACK = retour système') }
    grid.appendChild(sys)
  }

  // Récupère les vraies apps depuis Android
  let apps = []
  if(typeof Android !== 'undefined' && Android.getInstalledApps){
    try { apps = JSON.parse(Android.getInstalledApps()) } catch(e){}
  }

  // Fallback apps de démo si pas d'Android bridge
  if(apps.length === 0){
    apps = [
      {name:'Claude',icon:'🤖',pkg:'com.anthropic.claude'},
      {name:'Chrome',icon:'🌐',pkg:'com.android.chrome'},
      {name:'Discord',icon:'💬',pkg:'com.discord'},
      {name:'WhatsApp',icon:'💚',pkg:'com.whatsapp'},
      {name:'YouTube',icon:'▶️',pkg:'com.google.android.youtube'},
      {name:'Gmail',icon:'📧',pkg:'com.google.android.gm'},
      {name:'Spotify',icon:'🎵',pkg:'com.spotify.music'},
      {name:'Instagram',icon:'📸',pkg:'com.instagram.android'},
      {name:'Telegram',icon:'✈️',pkg:'org.telegram.messenger'},
      {name:'Netflix',icon:'🎬',pkg:'com.netflix.mediaclient'},
      {name:'TikTok',icon:'🎵',pkg:'com.zhiliaoapp.musically'},
      {name:'Twitter',icon:'🐦',pkg:'com.twitter.android'},
    ]
  }

  apps.forEach(app => {
    const item = document.createElement('div')
    item.className = 'app-item' + (selected?.pkg===app.pkg ? ' selected' : '')
    const iconHtml = app.iconBase64
      ? `<img src="data:image/png;base64,${app.iconBase64}" style="width:100%;height:100%;border-radius:12px;object-fit:cover"/>`
      : `<span style="font-size:1.6rem">${app.icon||'📱'}</span>`
    item.innerHTML = `<div class="icon" style="background:#1e1e2a">${iconHtml}</div><div class="name">${app.name}</div>`
    item.onclick = () => {
      if(target==='go'){ goApp=app; localStorage.setItem('goApp',JSON.stringify(app)) }
      else { backApp=app; localStorage.setItem('backApp',JSON.stringify(app)) }
      updateLabels(); closePicker()
      toast('✅ '+(target==='go'?'GO':'BACK')+' = '+app.name)
    }
    grid.appendChild(item)
  })
}

function closePicker(){
  document.getElementById('appPicker').classList.remove('on')
}

document.getElementById('pickerClose').addEventListener('click', closePicker)
document.getElementById('pickerClose').addEventListener('touchend', e=>{ e.preventDefault(); closePicker() })

// Drag + long press
;['btnGo','btnBack'].forEach(id => {
  const el = document.getElementById(id)
  let fd=null, dragged=false

  function startPress(cx, cy){
    fd={cx,cy}; dragged=false
    pressTimer = setTimeout(()=>{
      if(!dragged){ el.classList.remove('pressing'); openPicker(el.dataset.target) }
    }, 2000)
    el.classList.add('pressing')
  }
  function movePress(cx, cy){
    if(!fd) return
    if(Math.abs(cx-fd.cx)+Math.abs(cy-fd.cy) > 8){
      dragged=true; clearTimeout(pressTimer); el.classList.remove('pressing')
      // drag les boutons
      const rect = document.getElementById('btns').getBoundingClientRect()
      document.getElementById('btns').style.right = (window.innerWidth - cx - 32) + 'px'
      document.getElementById('btns').style.bottom = (window.innerHeight - cy - 32) + 'px'
    }
  }
  function endPress(){
    clearTimeout(pressTimer); el.classList.remove('pressing')
    if(!dragged) tapBtn(el.dataset.target)
    fd=null; dragged=false
  }

  el.addEventListener('touchstart', e=>{ e.preventDefault(); const p=e.touches[0]; startPress(p.clientX,p.clientY) },{passive:false})
  el.addEventListener('touchmove', e=>{ e.preventDefault(); const p=e.touches[0]; movePress(p.clientX,p.clientY) },{passive:false})
  el.addEventListener('touchend', e=>{ e.preventDefault(); endPress() },{passive:false})
  el.addEventListener('mousedown', e=>startPress(e.clientX,e.clientY))
  document.addEventListener('mousemove', e=>{ if(fd) movePress(e.clientX,e.clientY) })
  document.addEventListener('mouseup', ()=>{ if(fd) endPress() })
})
</script>
</body>
</html>
