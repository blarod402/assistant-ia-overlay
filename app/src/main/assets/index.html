<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Assistant IA Chat</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d12;--surface:#16161f;--card:#1e1e2a;--border:#2a2a3d;--accent:#ff3c6e;--accent2:#7c3aed;--text:#e8e8f0;--muted:#6b6b80}
html,body{height:100%;overflow:hidden;background:rgba(0,0,0,0.01)}
body{font-family:'Syne',sans-serif;color:var(--text);touch-action:none}

/* FAB */
#fab{position:fixed;width:62px;height:62px;border-radius:50%;background:linear-gradient(135deg,#ff3c6e,#7c3aed);border:none;z-index:9999;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(255,60,110,.6);touch-action:none;user-select:none;cursor:pointer;animation:pulse 2.5s infinite;bottom:40px;right:24px}
#fab svg{pointer-events:none}
@keyframes pulse{0%,100%{box-shadow:0 4px 20px rgba(255,60,110,.6),0 0 0 0 rgba(255,60,110,.3)}50%{box-shadow:0 4px 20px rgba(255,60,110,.6),0 0 0 14px rgba(255,60,110,0)}}

/* CHAT WINDOW */
#chat{position:fixed;z-index:9998;background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.9);display:none;flex-direction:column;overflow:hidden;touch-action:none}
#chat.on{display:flex;animation:cIn .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes cIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}

/* CHAT HEADER — draggable */
#chat-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);cursor:move;flex-shrink:0;touch-action:none;user-select:none}
.chat-title{display:flex;align-items:center;gap:8px}
.chat-title span{font-size:.82rem;font-weight:700;color:var(--text);letter-spacing:.02em}
.chat-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite}
.chat-actions{display:flex;gap:6px}
.hbtn{background:none;border:none;color:var(--muted);cursor:pointer;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;touch-action:manipulation}
.hbtn:active{background:var(--border)}

/* RESIZE HANDLE */
#resizeHandle{position:absolute;bottom:0;right:0;width:24px;height:24px;cursor:se-resize;touch-action:none;display:flex;align-items:flex-end;justify-content:flex-end;padding:4px}
#resizeHandle::after{content:'';width:10px;height:10px;border-right:2px solid var(--muted);border-bottom:2px solid var(--muted);border-radius:0 0 3px 0}

/* MESSAGES */
#messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch;min-height:0}
.msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:.9rem;line-height:1.6;word-break:break-word}
.msg.user{background:linear-gradient(135deg,#ff3c6e,#7c3aed);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.ai{background:var(--surface);border:1px solid var(--border);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px}
.msg.ai .mlbl{font-size:.65rem;font-family:'JetBrains Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.ldots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:#a78bfa;margin:0 2px;animation:bou 1.2s infinite}
.ldots span:nth-child(2){animation-delay:.2s}.ldots span:nth-child(3){animation-delay:.4s}
@keyframes bou{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1.1);opacity:1}}

/* INPUT */
#input-area{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;align-items:flex-end}
#input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-family:'Syne',sans-serif;font-size:.9rem;resize:none;max-height:100px;min-height:40px;outline:none;touch-action:auto}
#input:focus{border-color:var(--accent)}
#sendBtn{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#ff3c6e,#7c3aed);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation}
#sendBtn:active{opacity:.8}
#sendBtn:disabled{opacity:.4}

/* API KEY SETUP */
#apiSetup{padding:16px;display:flex;flex-direction:column;gap:10px}
#apiSetup p{font-size:.82rem;color:var(--muted);line-height:1.6}
#apiSetup a{color:var(--accent)}
#apiInput{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.78rem;outline:none;width:100%;touch-action:auto}
#apiInput:focus{border-color:var(--accent)}
#saveApiBtn{padding:11px;background:linear-gradient(135deg,#ff3c6e,#7c3aed);border:none;border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;touch-action:manipulation}

#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-90px);background:var(--card);border:1px solid var(--border);color:var(--text);padding:9px 18px;border-radius:10px;font-size:.8rem;font-family:'JetBrains Mono',monospace;z-index:99999;transition:transform .28s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap}
#toast.on{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="fab">
  <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
    <path d="M12 2L13.5 8.5L20 7L15.5 12L20 17L13.5 15.5L12 22L10.5 15.5L4 17L8.5 12L4 7L10.5 8.5Z"/>
  </svg>
</div>

<div id="chat">
  <div id="chat-header">
    <div class="chat-title">
      <div class="chat-dot"></div>
      <span>Assistant IA</span>
    </div>
    <div class="chat-actions">
      <button class="hbtn" id="settingsBtn" title="API Key">⚙️</button>
      <button class="hbtn" id="clearBtn" title="Effacer">🗑️</button>
      <button class="hbtn" id="closeBtn" title="Fermer">✕</button>
    </div>
  </div>

  <div id="apiSetup" style="display:none">
    <p>Entre ta clé <strong style="color:var(--accent)">Gemini gratuite</strong> :<br>
    Va sur <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a> → Get API Key</p>
    <input id="apiInput" placeholder="AIza..." type="password"/>
    <button id="saveApiBtn">💾 Sauvegarder</button>
  </div>

  <div id="messages">
    <div class="msg ai">
      <div class="mlbl">🤖 Assistant IA</div>
      Bonjour ! Pose-moi n'importe quelle question 😊
    </div>
  </div>

  <div id="input-area">
    <textarea id="input" placeholder="Pose ta question..." rows="1"></textarea>
    <button id="sendBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m22 2-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>

  <div id="resizeHandle"></div>
</div>

<div id="toast"></div>

<script>
const $=id=>document.getElementById(id)
const P=e=>e.touches?(e.touches[0]||e.changedTouches[0]):e
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v))
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(msg,d=2600){const t=$('toast');t.textContent=msg;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),d)}

// FAB DRAG + TAP
const fab=$('fab')
let fp={x:window.innerWidth-86,y:window.innerHeight-102},fd=null,dragged=false,chatOpen=false
function setFab(){fab.style.cssText+=`;left:${fp.x}px;top:${fp.y}px;right:auto;bottom:auto`}
setFab()
fab.addEventListener('touchstart',e=>{e.preventDefault();const p=P(e);fd={ox:fp.x,oy:fp.y,cx:p.clientX,cy:p.clientY};dragged=false},{passive:false})
fab.addEventListener('touchmove',e=>{if(!fd)return;e.preventDefault();const p=P(e),dx=p.clientX-fd.cx,dy=p.clientY-fd.cy;if(Math.abs(dx)+Math.abs(dy)>5)dragged=true;if(dragged){fp.x=clamp(fd.ox+dx,0,window.innerWidth-62);fp.y=clamp(fd.oy+dy,0,window.innerHeight-62);setFab()}},{passive:false})
fab.addEventListener('touchend',e=>{e.preventDefault();if(!dragged)toggleChat();fd=null;dragged=false},{passive:false})
fab.addEventListener('mousedown',e=>{fd={ox:fp.x,oy:fp.y,cx:e.clientX,cy:e.clientY};dragged=false})
document.addEventListener('mousemove',e=>{if(!fd)return;const dx=e.clientX-fd.cx,dy=e.clientY-fd.cy;if(Math.abs(dx)+Math.abs(dy)>5)dragged=true;if(dragged){fp.x=clamp(fd.ox+dx,0,window.innerWidth-62);fp.y=clamp(fd.oy+dy,0,window.innerHeight-62);setFab()}})
document.addEventListener('mouseup',e=>{if(!fd)return;if(!dragged)toggleChat();fd=null;dragged=false})

// CHAT WINDOW
const chat=$('chat')
let cPos={x:20,y:80},cSize={w:Math.min(360,window.innerWidth-40),h:Math.min(500,window.innerHeight-120)}

function posChat(){
  chat.style.left=cPos.x+'px';chat.style.top=cPos.y+'px'
  chat.style.width=cSize.w+'px';chat.style.height=cSize.h+'px'
}

function toggleChat(){
  chatOpen=!chatOpen
  chat.classList.toggle('on',chatOpen)
  if(chatOpen){
    cPos.x=Math.max(10,Math.min(window.innerWidth-cSize.w-10,fp.x-cSize.w/2))
    cPos.y=Math.max(10,Math.min(fp.y-cSize.h-10,window.innerHeight-cSize.h-10))
    if(cPos.y<10) cPos.y=fp.y+70
    posChat()
    $('input').focus()
  }
}

// DRAG CHAT HEADER
const header=$('chat-header')
let hd=null
header.addEventListener('touchstart',e=>{if(e.target.closest('.hbtn'))return;e.preventDefault();const p=P(e);hd={cx:p.clientX,cy:p.clientY,ox:cPos.x,oy:cPos.y}},{passive:false})
header.addEventListener('touchmove',e=>{if(!hd)return;e.preventDefault();const p=P(e);cPos.x=hd.ox+p.clientX-hd.cx;cPos.y=hd.oy+p.clientY-hd.cy;posChat()},{passive:false})
header.addEventListener('touchend',()=>{hd=null},{passive:false})
header.addEventListener('mousedown',e=>{if(e.target.closest('.hbtn'))return;hd={cx:e.clientX,cy:e.clientY,ox:cPos.x,oy:cPos.y}})
document.addEventListener('mousemove',e=>{if(!hd)return;cPos.x=hd.ox+e.clientX-hd.cx;cPos.y=hd.oy+e.clientY-hd.cy;posChat()})
document.addEventListener('mouseup',()=>{hd=null})

// RESIZE
const rh=$('resizeHandle')
let rd=null
rh.addEventListener('touchstart',e=>{e.preventDefault();const p=P(e);rd={cx:p.clientX,cy:p.clientY,ow:cSize.w,oh:cSize.h}},{passive:false})
rh.addEventListener('touchmove',e=>{if(!rd)return;e.preventDefault();const p=P(e);cSize.w=Math.max(260,rd.ow+p.clientX-rd.cx);cSize.h=Math.max(300,rd.oh+p.clientY-rd.cy);posChat()},{passive:false})
rh.addEventListener('touchend',()=>{rd=null},{passive:false})
rh.addEventListener('mousedown',e=>{e.preventDefault();rd={cx:e.clientX,cy:e.clientY,ow:cSize.w,oh:cSize.h}})
document.addEventListener('mousemove',e=>{if(!rd)return;cSize.w=Math.max(260,rd.ow+e.clientX-rd.cx);cSize.h=Math.max(300,rd.oh+e.clientY-rd.cy);posChat()})
document.addEventListener('mouseup',()=>{rd=null})

// BUTTONS
$('closeBtn').addEventListener('click',()=>{chatOpen=false;chat.classList.remove('on')})
$('closeBtn').addEventListener('touchend',e=>{e.preventDefault();chatOpen=false;chat.classList.remove('on')})
$('clearBtn').addEventListener('click',clearChat)
$('clearBtn').addEventListener('touchend',e=>{e.preventDefault();clearChat()})
$('settingsBtn').addEventListener('click',toggleSettings)
$('settingsBtn').addEventListener('touchend',e=>{e.preventDefault();toggleSettings()})
$('saveApiBtn').addEventListener('click',saveApi)
$('saveApiBtn').addEventListener('touchend',e=>{e.preventDefault();saveApi()})

function clearChat(){
  $('messages').innerHTML=`<div class="msg ai"><div class="mlbl">🤖 Assistant IA</div>Bonjour ! Pose-moi n'importe quelle question 😊</div>`
}

function toggleSettings(){
  const s=$('apiSetup')
  s.style.display=s.style.display==='none'?'flex':'none'
  if(s.style.display==='flex') s.style.flexDirection='column'
}

// API KEY
let apiKey = localStorage.getItem('gemini_key') || ''
function saveApi(){
  apiKey=$('apiInput').value.trim()
  if(!apiKey){toast('⚠️ Clé vide !');return}
  localStorage.setItem('gemini_key',apiKey)
  $('apiSetup').style.display='none'
  toast('✅ Clé sauvegardée !')
}

// SEND
$('input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}
})
$('sendBtn').addEventListener('click',sendMsg)
$('sendBtn').addEventListener('touchend',e=>{e.preventDefault();sendMsg()})

// Auto resize textarea
$('input').addEventListener('input',function(){
  this.style.height='auto'
  this.style.height=Math.min(this.scrollHeight,100)+'px'
})

let history=[]

function sendMsg(){
  const input=$('input')
  const text=input.value.trim()
  if(!text)return
  if(!apiKey){toggleSettings();toast('⚠️ Entre ta clé Gemini d\'abord !');return}
  input.value='';input.style.height='auto'
  addMsg(text,'user')
  history.push({role:'user',parts:[{text}]})
  callGemini()
}

function addMsg(text,role){
  const msgs=$('messages')
  const div=document.createElement('div')
  div.className='msg '+role
  if(role==='ai') div.innerHTML=`<div class="mlbl">🤖 Assistant IA</div>${esc(text).replace(/\n/g,'<br>')}`
  else div.textContent=text
  msgs.appendChild(div)
  msgs.scrollTop=msgs.scrollHeight
  return div
}

async function callGemini(){
  const msgs=$('messages')
  const loadDiv=document.createElement('div')
  loadDiv.className='msg ai'
  loadDiv.innerHTML=`<div class="mlbl">🤖 Assistant IA</div><div class="ldots"><span></span><span></span><span></span></div>`
  msgs.appendChild(loadDiv);msgs.scrollTop=msgs.scrollHeight
  $('sendBtn').disabled=true

  try{
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[
          {role:'user',parts:[{text:'Tu es un assistant francophone. Réponds clairement et utilement en français.'}]},
          ...history
        ]
      })
    })
    const d=await res.json()
    if(d.error){throw new Error(d.error.message)}
    const reply=d.candidates?.[0]?.content?.parts?.[0]?.text||'Pas de réponse.'
    history.push({role:'model',parts:[{text:reply}]})
    loadDiv.innerHTML=`<div class="mlbl">🤖 Assistant IA</div>${esc(reply).replace(/\n/g,'<br>')}`
    msgs.scrollTop=msgs.scrollHeight
  }catch(err){
    loadDiv.innerHTML=`<div class="mlbl" style="color:#ff3c6e">❌ Erreur</div><div style="color:#ff3c6e;font-size:.84rem">${esc(err.message)}</div>`
  }
  $('sendBtn').disabled=false
}
</script>
</body>
</html>
