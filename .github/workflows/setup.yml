name: Setup Project

on:
  push:
    branches: [ main ]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create all project files
        run: |
          mkdir -p app/src/main/java/com/assistantia/overlay
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper

          cat > settings.gradle << 'SETTINGS'
          rootProject.name = "AssistantIA"
          include ':app'
          SETTINGS

          cat > build.gradle << 'BUILDROOT'
          buildscript {
              ext.kotlin_version = '1.9.22'
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          BUILDROOT

          cat > gradle.properties << 'PROPS'
          android.useAndroidX=true
          android.enableJetifier=true
          PROPS

          cat > gradle/wrapper/gradle-wrapper.properties << 'WRAPPER'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          WRAPPER

          cat > app/build.gradle << 'APPBUILD'
          plugins {
              id 'com.android.application'
              id 'kotlin-android'
          }
          android {
              compileSdk 34
              defaultConfig {
                  applicationId "com.assistantia.overlay"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions { jvmTarget = '1.8' }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          APPBUILD

          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.assistantia.overlay">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <application
                  android:allowBackup="true"
                  android:label="Assistant IA"
                  android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name=".OverlayService" android:exported="false"/>
              </application>
          </manifest>
          MANIFEST

          cat > app/src/main/res/values/strings.xml << 'STRINGS'
          <resources>
              <string name="app_name">Assistant IA</string>
          </resources>
          STRINGS

          cat > app/src/main/res/layout/activity_main.xml << 'MAINLAYOUT'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:gravity="center"
              android:padding="32dp"
              android:background="#0d0d12">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="Assistant IA" android:textSize="28sp" android:textStyle="bold"
                  android:textColor="#ff3c6e" android:layout_marginBottom="12dp"/>
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="Overlay sur toutes les apps" android:textSize="14sp"
                  android:textColor="#6b6b80" android:layout_marginBottom="48dp"/>
              <Button android:id="@+id/btnStart" android:layout_width="match_parent"
                  android:layout_height="56dp" android:text="Charger l'IA"
                  android:textColor="#ffffff" android:backgroundTint="#ff3c6e"
                  android:layout_marginBottom="16dp"/>
              <Button android:id="@+id/btnStop" android:layout_width="match_parent"
                  android:layout_height="56dp" android:text="Enlever l'IA"
                  android:textColor="#ffffff" android:backgroundTint="#2a2a3d"/>
          </LinearLayout>
          MAINLAYOUT

          cat > app/src/main/res/layout/overlay_layout.xml << 'OVERLAYLAYOUT'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent">
              <WebView android:id="@+id/webView"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"/>
          </FrameLayout>
          OVERLAYLAYOUT

          cat > app/src/main/java/com/assistantia/overlay/MainActivity.kt << 'MAINACTIVITY'
          package com.assistantia.overlay
          import android.content.Intent
          import android.net.Uri
          import android.os.Bundle
          import android.provider.Settings
          import android.widget.Button
          import androidx.appcompat.app.AppCompatActivity
          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  if (!Settings.canDrawOverlays(this)) {
                      startActivityForResult(Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                          Uri.parse("package:$packageName")), 1234)
                  }
                  findViewById<Button>(R.id.btnStart).setOnClickListener {
                      startService(Intent(this, OverlayService::class.java).apply { action = "START" })
                  }
                  findViewById<Button>(R.id.btnStop).setOnClickListener {
                      startService(Intent(this, OverlayService::class.java).apply { action = "STOP" })
                  }
              }
          }
          MAINACTIVITY

          cat > app/src/main/java/com/assistantia/overlay/OverlayService.kt << 'OVERLAYSERVICE'
          package com.assistantia.overlay
          import android.app.Service
          import android.content.Intent
          import android.graphics.PixelFormat
          import android.os.IBinder
          import android.view.Gravity
          import android.view.LayoutInflater
          import android.view.WindowManager
          import android.webkit.WebSettings
          import android.webkit.WebView
          import android.webkit.WebViewClient
          class OverlayService : Service() {
              private var wm: WindowManager? = null
              private var view: android.view.View? = null
              override fun onBind(i: Intent?): IBinder? = null
              override fun onStartCommand(intent: Intent?, f: Int, id: Int): Int {
                  when (intent?.action) { "START" -> show(); "STOP" -> hide() }
                  return START_NOT_STICKY
              }
              private fun show() {
                  if (view != null) return
                  wm = getSystemService(WINDOW_SERVICE) as WindowManager
                  val p = WindowManager.LayoutParams(
                      WindowManager.LayoutParams.MATCH_PARENT,
                      WindowManager.LayoutParams.MATCH_PARENT,
                      WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE,
                      PixelFormat.TRANSLUCENT)
                  p.gravity = Gravity.TOP or Gravity.START
                  view = LayoutInflater.from(this).inflate(R.layout.overlay_layout, null)
                  val wb = view!!.findViewById<WebView>(R.id.webView)
                  wb.settings.javaScriptEnabled = true
                  wb.settings.domStorageEnabled = true
                  wb.settings.cacheMode = WebSettings.LOAD_DEFAULT
                  wb.webViewClient = WebViewClient()
                  wb.loadUrl("file:///android_asset/index.html")
                  wm!!.addView(view, p)
              }
              private fun hide() { view?.let { wm?.removeView(it); view = null }; stopSelf() }
          }
          OVERLAYSERVICE

          chmod +x gradlew

          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .
          git commit -m "Setup complete project"
          git push

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AssistantIA
          path: app/build/outputs/apk/debug/app-debug.apk
